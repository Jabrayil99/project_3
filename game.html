<main class="content">
    <h2>🐍 Snake Game</h2>
    <p>Use arrow keys to control the snake. Eat the red food to grow. Don't hit the walls or yourself!</p>

    <div class="game-wrapper">
        <div class="game-score">Score: <span id="score">0</span> &nbsp;|&nbsp; High Score: <span id="highscore">0</span></div>
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div class="game-controls">
            <button id="startBtn" onclick="startGame()">Start Game</button>
            <button id="restartBtn" onclick="restartGame()" style="display:none;">Restart</button>
        </div>
        <div class="game-hint">Arrow keys to move &nbsp;|&nbsp; Works on desktop</div>
    </div>
</main>
